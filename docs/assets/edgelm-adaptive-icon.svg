<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EdgeLM Android adaptive icon (108dp spec)">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14181B"/><stop offset="1" stop-color="#0B0E10"/>
    </linearGradient>
    <linearGradient id="sigA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B6FF5A"/><stop offset="1" stop-color="#7CEB1E"/>
    </linearGradient>
    <radialGradient id="sparkA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7DF3FF"/><stop offset="1" stop-color="#2DE3FF"/>
    </radialGradient>
  </defs>
  <!-- BACKGROUND layer: full 512 bleed -->
  <rect width="512" height="512" fill="url(#bgA)"/>
  <!-- subtle circuit texture in background -->
  <g stroke="#1E262B" stroke-width="2" fill="none" opacity="0.6">
    <path d="M0,128 H140 M372,128 H512 M0,384 H140 M372,384 H512 M128,0 V140 M384,0 V140 M128,372 V512 M384,372 V512"/>
    <circle cx="140" cy="128" r="4" fill="#1E262B"/><circle cx="372" cy="384" r="4" fill="#1E262B"/>
  </g>
  <!-- safe-zone guide (66dp of 108dp diameter) - export layers separately for production -->
  <circle cx="256" cy="256" r="156" fill="none" stroke="#2A3238" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.5"/>
  <!-- FOREGROUND layer: glyph kept inside 66dp safe circle -->
  <g transform="translate(256,256) scale(0.62) translate(-256,-256)">
    <g fill="url(#sigA)">
      <rect x="150" y="150" width="46" height="212" rx="23"/>
      <rect x="150" y="150" width="190" height="46" rx="23"/>
      <rect x="150" y="233" width="140" height="46" rx="23"/>
      <rect x="150" y="316" width="190" height="46" rx="23"/>
    </g>
    <circle cx="356" cy="256" r="24" fill="url(#sparkA)"/>
  </g>
</svg>
