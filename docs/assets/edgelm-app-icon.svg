<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EdgeLM app icon">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14181B"/>
      <stop offset="1" stop-color="#0B0E10"/>
    </linearGradient>
    <linearGradient id="signal" x1="150" y1="150" x2="200" y2="362" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B6FF5A"/>
      <stop offset="1" stop-color="#7CEB1E"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7DF3FF"/>
      <stop offset="1" stop-color="#2DE3FF"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Chip tile with clipped top-right "edge" notch -->
  <path d="M104,0 L362,0 L512,150 L512,408 A104,104 0 0 1 408,512 L104,512 A104,104 0 0 1 0,408 L0,104 A104,104 0 0 1 104,0 Z" fill="url(#tile)"/>
  <path d="M104,0 L362,0 L512,150 L512,408 A104,104 0 0 1 408,512 L104,512 A104,104 0 0 1 0,408 L0,104 A104,104 0 0 1 104,0 Z" fill="none" stroke="#2A3238" stroke-width="2"/>
  <!-- E monogram = layered runtime stack -->
  <g fill="url(#signal)">
    <rect x="150" y="150" width="46" height="212" rx="23"/>
    <rect x="150" y="150" width="190" height="46" rx="23"/>
    <rect x="150" y="233" width="140" height="46" rx="23"/>
    <rect x="150" y="316" width="190" height="46" rx="23"/>
  </g>
  <!-- local intelligence spark -->
  <circle cx="356" cy="256" r="24" fill="url(#spark)" filter="url(#glow)"/>
</svg>
