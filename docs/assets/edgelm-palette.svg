    </g>
    <g transform="translate(640,84)">
      <rect width="130" height="130" rx="18" fill="#2DE3FF"/>
      <text x="10" y="150" font-size="15" font-weight="700" fill="#F5F7F6">Volt Cyan</text>
      <text x="10" y="170" font-size="13" fill="#7C8A93">#2DE3FF</text>
    </g>
    <g transform="translate(790,84)">
      <rect width="90" height="130" rx="18" fill="#F5F7F6"/>
      <text x="10" y="150" font-size="15" font-weight="700" fill="#F5F7F6">Mist</text>
      <text x="10" y="170" font-size="13" fill="#7C8A93">#F5F7F6</text>
